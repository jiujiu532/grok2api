<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="login.adminPageTitle">Grok2API - Admin</title>
  <link rel="icon" href="/favicon.ico?v={{APP_VERSION}}">
  <link href="https://cdn.jsdelivr.net/npm/geist@1.0.0/dist/fonts/geist-sans/style.css" rel="stylesheet">
  <link href="/static/css/app.css?v={{APP_VERSION}}" rel="stylesheet">
</head>
<body class="login-body">
  <div class="login-bg"></div>
  <div class="login-shell">
    <div class="login-card">
      <div class="login-brand">
        <a href="https://github.com/jiujiu532/grok2api" target="_blank" rel="noopener" class="flex items-center gap-2" style="color:inherit">
          <span class="login-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="8"/><path d="M8 12h8M12 8l4 4-4 4"/></svg>
          </span>
          <span>Grok2API</span>
        </a>
      </div>
      <div class="login-title" data-i18n="login.adminTitle">管理后台</div>
      <div class="login-subtitle" data-i18n="login.adminSubtitle">请输入后台密码以继续</div>
      <div class="login-form">
        <input type="password" id="key" placeholder="后台密码" data-i18n-placeholder="login.adminPlaceholder" class="input" autocomplete="current-password">
        <button type="button" onclick="login()" class="btn btn-primary w-full" data-i18n="login.continue">继续</button>
      </div>
    </div>
  </div>
  <script src="/static/js/i18n.js?v={{APP_VERSION}}"></script>
  <script src="/static/js/auth.js?v={{APP_VERSION}}"></script>
  <script src="/static/js/toast.js?v={{APP_VERSION}}"></script>
  <script src="/static/js/footer.js?v={{APP_VERSION}}"></script>
  <script>
    const el = document.getElementById('key');
    el.addEventListener('keypress', e => { if (e.key === 'Enter') login(); });

    async function login() {
      const key = el.value.trim();
      if (!key) return;
      try {
        if (await verifyKey(ADMIN_API+'/verify', key)) { await adminKey.set(key); location.href='/admin/dashboard'; }
        else showToast(t('common.invalidKey'), 'error');
      } catch { showToast(t('common.connectionFailed'), 'error'); }
    }

    (async () => {
      const key = await adminKey.get();
      if (key) try { if (await verifyKey(ADMIN_API+'/verify', key)) location.href='/admin/dashboard'; } catch {}
      await renderSiteFooter?.();
    })();
  </script>
</body>
</html>
